<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0c0c0c"/>
  <defs>
    <pattern id="deGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141414" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#deGrid)"/>

  <text x="40" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666" letter-spacing="0.1em">DATA PIPELINE ARCHITECTURE</text>

  <!-- Source nodes (left column) -->
  <rect x="40" y="70" width="140" height="40" rx="0" fill="#0c0c0c" stroke="#97C148" stroke-width="1"/>
  <text x="55" y="94" font-family="'JetBrains Mono', monospace" font-size="10" fill="#97C148">Voter Files</text>

  <rect x="40" y="130" width="140" height="40" rx="0" fill="#0c0c0c" stroke="#97C148" stroke-width="1"/>
  <text x="55" y="154" font-family="'JetBrains Mono', monospace" font-size="10" fill="#97C148">Census API</text>

  <rect x="40" y="190" width="140" height="40" rx="0" fill="#0c0c0c" stroke="#dee583" stroke-width="1"/>
  <text x="55" y="214" font-family="'JetBrains Mono', monospace" font-size="10" fill="#dee583">FEC Records</text>

  <rect x="40" y="250" width="140" height="40" rx="0" fill="#0c0c0c" stroke="#dee583" stroke-width="1"/>
  <text x="55" y="274" font-family="'JetBrains Mono', monospace" font-size="10" fill="#dee583">Polling Data</text>

  <rect x="40" y="310" width="140" height="40" rx="0" fill="#0c0c0c" stroke="#666" stroke-width="1"/>
  <text x="55" y="334" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">GIS Shapefiles</text>

  <!-- Arrows to processing -->
  <line x1="180" y1="90" x2="280" y2="160" stroke="#97C148" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="150" x2="280" y2="170" stroke="#97C148" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="210" x2="280" y2="190" stroke="#dee583" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="270" x2="280" y2="210" stroke="#dee583" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="330" x2="280" y2="220" stroke="#666" stroke-width="1" opacity="0.5"/>

  <!-- Processing layer -->
  <rect x="280" y="120" width="180" height="140" rx="0" fill="#141414" stroke="#97C148" stroke-width="1.5"/>
  <text x="300" y="148" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148" letter-spacing="0.05em">SIEGE_UTILITIES</text>
  <line x1="295" y1="155" x2="445" y2="155" stroke="#1e1e1e" stroke-width="1"/>
  <text x="300" y="174" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">37 GeoDjango models</text>
  <text x="300" y="190" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">PySpark + Sedona</text>
  <text x="300" y="206" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">PostGIS transforms</text>
  <text x="300" y="222" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">dbt + Airflow</text>
  <text x="300" y="246" font-family="'JetBrains Mono', monospace" font-size="8" fill="#97C148">1,884+ tests passing</text>

  <!-- Arrows to output -->
  <line x1="460" y1="160" x2="560" y2="100" stroke="#97C148" stroke-width="1" opacity="0.5"/>
  <line x1="460" y1="190" x2="560" y2="190" stroke="#97C148" stroke-width="1" opacity="0.5"/>
  <line x1="460" y1="220" x2="560" y2="280" stroke="#97C148" stroke-width="1" opacity="0.5"/>

  <!-- Output nodes -->
  <rect x="560" y="70" width="200" height="55" rx="0" fill="#0c0c0c" stroke="#97C148" stroke-width="1"/>
  <text x="575" y="90" font-family="'JetBrains Mono', monospace" font-size="10" fill="#97C148">Redistricting Platform</text>
  <text x="575" y="108" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">~13,000 analysts</text>

  <rect x="560" y="160" width="200" height="55" rx="0" fill="#0c0c0c" stroke="#dee583" stroke-width="1"/>
  <text x="575" y="180" font-family="'JetBrains Mono', monospace" font-size="10" fill="#dee583">Civic Graph</text>
  <text x="575" y="198" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">$1B+ unified dataset</text>

  <rect x="560" y="250" width="200" height="55" rx="0" fill="#0c0c0c" stroke="#97C148" stroke-width="1"/>
  <text x="575" y="270" font-family="'JetBrains Mono', monospace" font-size="10" fill="#97C148">elect.info</text>
  <text x="575" y="288" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">Billions of FEC records</text>

  <!-- Bottom metrics -->
  <rect x="560" y="340" width="200" height="40" fill="#0c0c0c" stroke="#1e1e1e" stroke-width="1"/>
  <text x="575" y="358" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148">▸ 6.5h → 47min processing</text>
  <text x="575" y="372" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">  3.2x faster than ArcGIS</text>
</svg>
