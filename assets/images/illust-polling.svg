<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0c0c0c"/>
  <defs>
    <pattern id="pollGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141414" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#pollGrid)"/>

  <!-- Title -->
  <text x="40" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666" letter-spacing="0.1em">WHERE-FIRST SAMPLING DESIGN</text>

  <!-- Geographic region outline (simplified state/county shape) -->
  <path d="M80,60 L280,50 L320,80 L350,60 L380,90 L370,140 L390,180 L380,240 L350,280 L300,310 L240,330 L180,320 L120,290 L80,240 L60,180 L70,120 Z" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Population density zones (concentric-ish regions) -->
  <!-- Urban core -->
  <ellipse cx="220" cy="170" rx="60" ry="45" stroke="#97C148" stroke-width="1" fill="#97C148" fill-opacity="0.08"/>
  <text x="195" y="174" font-family="'JetBrains Mono', monospace" font-size="8" fill="#97C148" opacity="0.7">URBAN CORE</text>

  <!-- Suburban ring -->
  <ellipse cx="220" cy="175" rx="110" ry="85" stroke="#97C148" stroke-width="0.5" fill="none" stroke-dasharray="3,3"/>

  <!-- Sampling points — different colors for different demographic segments -->
  <!-- Urban samples (dense) -->
  <circle cx="200" cy="155" r="3" fill="#97C148"/>
  <circle cx="230" cy="160" r="3" fill="#97C148"/>
  <circle cx="215" cy="180" r="3" fill="#97C148"/>
  <circle cx="240" cy="170" r="3" fill="#97C148"/>
  <circle cx="195" cy="175" r="3" fill="#97C148"/>
  <circle cx="225" cy="145" r="3" fill="#97C148"/>
  <circle cx="210" cy="195" r="3" fill="#97C148"/>

  <!-- Suburban samples (medium) -->
  <circle cx="160" cy="130" r="3" fill="#dee583"/>
  <circle cx="280" cy="140" r="3" fill="#dee583"/>
  <circle cx="300" cy="190" r="3" fill="#dee583"/>
  <circle cx="140" cy="200" r="3" fill="#dee583"/>
  <circle cx="270" cy="230" r="3" fill="#dee583"/>
  <circle cx="170" cy="240" r="3" fill="#dee583"/>

  <!-- Rural samples (sparse) -->
  <circle cx="110" cy="100" r="3" fill="#666"/>
  <circle cx="320" cy="100" r="3" fill="#666"/>
  <circle cx="340" cy="220" r="3" fill="#666"/>
  <circle cx="100" cy="270" r="3" fill="#666"/>
  <circle cx="250" cy="300" r="3" fill="#666"/>

  <!-- Connection lines showing geographic clustering -->
  <line x1="200" y1="155" x2="230" y2="160" stroke="#97C148" stroke-width="0.5" opacity="0.3"/>
  <line x1="230" y1="160" x2="215" y2="180" stroke="#97C148" stroke-width="0.5" opacity="0.3"/>
  <line x1="215" y1="180" x2="240" y2="170" stroke="#97C148" stroke-width="0.5" opacity="0.3"/>
  <line x1="195" y1="175" x2="210" y2="195" stroke="#97C148" stroke-width="0.5" opacity="0.3"/>

  <!-- Right panel: sampling metrics -->
  <rect x="440" y="50" width="340" height="300" fill="#0c0c0c" stroke="#1e1e1e" stroke-width="1"/>

  <text x="460" y="78" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666" letter-spacing="0.1em">SAMPLE-TO-UNIVERSE CORRESPONDENCE</text>

  <!-- Legend -->
  <circle cx="470" cy="110" r="4" fill="#97C148"/>
  <text x="482" y="114" font-family="Inter, sans-serif" font-size="12" fill="#e0e0e0">Urban core respondents</text>

  <circle cx="470" cy="135" r="4" fill="#dee583"/>
  <text x="482" y="139" font-family="Inter, sans-serif" font-size="12" fill="#e0e0e0">Suburban respondents</text>

  <circle cx="470" cy="160" r="4" fill="#666"/>
  <text x="482" y="164" font-family="Inter, sans-serif" font-size="12" fill="#e0e0e0">Rural respondents</text>

  <!-- Bar chart: representativeness comparison -->
  <text x="460" y="200" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">DEMOGRAPHIC REPRESENTATIVENESS</text>

  <!-- Siege bar -->
  <rect x="460" y="215" width="282" height="20" fill="#97C148" fill-opacity="0.15" stroke="#97C148" stroke-width="1"/>
  <rect x="460" y="215" width="282" height="20" fill="#97C148" fill-opacity="0.3"/>
  <text x="465" y="229" font-family="'JetBrains Mono', monospace" font-size="10" fill="#0c0c0c" font-weight="bold">SIEGE ANALYTICS</text>
  <text x="715" y="229" font-family="'JetBrains Mono', monospace" font-size="10" fill="#97C148">94%</text>

  <!-- Industry bar -->
  <rect x="460" y="245" width="228" height="20" fill="#666" fill-opacity="0.15" stroke="#666" stroke-width="1"/>
  <rect x="460" y="245" width="228" height="20" fill="#666" fill-opacity="0.2"/>
  <text x="465" y="259" font-family="'JetBrains Mono', monospace" font-size="10" fill="#999">INDUSTRY AVG</text>
  <text x="668" y="259" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">76%</text>

  <!-- Key insight -->
  <line x1="460" y1="285" x2="760" y2="285" stroke="#1e1e1e" stroke-width="1"/>
  <text x="460" y="305" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" font-style="italic">"You cannot understand people whom</text>
  <text x="460" y="320" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" font-style="italic">you refuse to see clearly."</text>

  <!-- Bottom readout -->
  <rect x="440" y="355" width="340" height="30" fill="#0c0c0c" stroke="#1e1e1e" stroke-width="1"/>
  <text x="455" y="374" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148">▸ 34% segmentation improvement</text>
</svg>
