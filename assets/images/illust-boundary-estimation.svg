  <text x="610" y="366" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148">▸ 178,000+ precincts mapped</text>
  <text x="610" y="380" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666">  73.5% cost reduction</text>
</svg>
