<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0c0c0c"/>
  <defs>
    <pattern id="segGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141414" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#segGrid)"/>

  <text x="40" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666" letter-spacing="0.1em">GEOGRAPHIC SEGMENTATION VS TABULAR</text>

  <!-- Left panel: Tabular segmentation (flat, no geography) -->
  <rect x="40" y="50" width="340" height="300" fill="#0c0c0c" stroke="#666" stroke-width="1"/>
  <text x="55" y="75" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666" letter-spacing="0.05em">TABULAR ONLY</text>

  <!-- Uniform grid of same-color dots (can't distinguish) -->
  <g opacity="0.5">
    <circle cx="80" cy="110" r="4" fill="#666"/>  <circle cx="120" cy="110" r="4" fill="#666"/>
    <circle cx="160" cy="110" r="4" fill="#666"/>  <circle cx="200" cy="110" r="4" fill="#666"/>
    <circle cx="240" cy="110" r="4" fill="#666"/>  <circle cx="280" cy="110" r="4" fill="#666"/>
    <circle cx="320" cy="110" r="4" fill="#666"/>
    <circle cx="80" cy="150" r="4" fill="#666"/>  <circle cx="120" cy="150" r="4" fill="#666"/>
    <circle cx="160" cy="150" r="4" fill="#666"/>  <circle cx="200" cy="150" r="4" fill="#666"/>
    <circle cx="240" cy="150" r="4" fill="#666"/>  <circle cx="280" cy="150" r="4" fill="#666"/>
    <circle cx="320" cy="150" r="4" fill="#666"/>
    <circle cx="80" cy="190" r="4" fill="#666"/>  <circle cx="120" cy="190" r="4" fill="#666"/>
    <circle cx="160" cy="190" r="4" fill="#666"/>  <circle cx="200" cy="190" r="4" fill="#666"/>
    <circle cx="240" cy="190" r="4" fill="#666"/>  <circle cx="280" cy="190" r="4" fill="#666"/>
    <circle cx="320" cy="190" r="4" fill="#666"/>
    <circle cx="80" cy="230" r="4" fill="#666"/>  <circle cx="120" cy="230" r="4" fill="#666"/>
    <circle cx="160" cy="230" r="4" fill="#666"/>  <circle cx="200" cy="230" r="4" fill="#666"/>
    <circle cx="240" cy="230" r="4" fill="#666"/>  <circle cx="280" cy="230" r="4" fill="#666"/>
    <circle cx="320" cy="230" r="4" fill="#666"/>
  </g>
  <text x="110" y="280" font-family="Inter, sans-serif" font-size="11" fill="#666">Same income, age, purchase history</text>
  <text x="130" y="296" font-family="Inter, sans-serif" font-size="11" fill="#666">→ same segment (wrong)</text>

  <!-- Right panel: Geographic segmentation -->
  <rect x="420" y="50" width="340" height="300" fill="#0c0c0c" stroke="#97C148" stroke-width="1.5"/>
  <text x="435" y="75" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148" letter-spacing="0.05em">WITH GEOGRAPHY</text>

  <!-- Map-like region with clusters colored by segment -->
  <!-- Urban zone -->
  <ellipse cx="540" cy="160" rx="50" ry="40" stroke="#97C148" stroke-width="0.5" fill="#97C148" fill-opacity="0.05"/>
  <circle cx="520" cy="145" r="5" fill="#97C148"/>
  <circle cx="545" cy="155" r="5" fill="#97C148"/>
  <circle cx="530" cy="170" r="5" fill="#97C148"/>
  <circle cx="555" cy="145" r="5" fill="#97C148"/>
  <circle cx="540" cy="180" r="5" fill="#97C148"/>
  <circle cx="560" cy="165" r="5" fill="#97C148"/>

  <!-- Suburban zone -->
  <circle cx="470" cy="120" r="5" fill="#dee583"/>
  <circle cx="610" cy="130" r="5" fill="#dee583"/>
  <circle cx="630" cy="170" r="5" fill="#dee583"/>
  <circle cx="460" cy="190" r="5" fill="#dee583"/>
  <circle cx="620" cy="210" r="5" fill="#dee583"/>

  <!-- Rural zone -->
  <circle cx="450" cy="260" r="5" fill="#a0a0a0"/>
  <circle cx="510" cy="280" r="5" fill="#a0a0a0"/>
  <circle cx="600" cy="250" r="5" fill="#a0a0a0"/>
  <circle cx="680" cy="270" r="5" fill="#a0a0a0"/>

  <!-- Legend -->
  <circle cx="440" cy="310" r="4" fill="#97C148"/>
  <text x="450" y="314" font-family="'JetBrains Mono', monospace" font-size="8" fill="#97C148">Dense urban</text>
  <circle cx="540" cy="310" r="4" fill="#dee583"/>
  <text x="550" y="314" font-family="'JetBrains Mono', monospace" font-size="8" fill="#dee583">Suburban</text>
  <circle cx="630" cy="310" r="4" fill="#a0a0a0"/>
  <text x="640" y="314" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a0a0a0">Rural</text>

  <text x="440" y="340" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0">Same demographics, different behavior</text>
  <text x="440" y="355" font-family="Inter, sans-serif" font-size="11" fill="#97C148">→ geography explains the difference</text>

  <!-- Bottom metrics -->
  <rect x="40" y="365" width="720" height="28" fill="#0c0c0c" stroke="#1e1e1e" stroke-width="1"/>
  <text x="55" y="383" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148">▸ $4.9M additional revenue</text>
  <text x="280" y="383" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148">▸ 23% conversion improvement</text>
  <text x="530" y="383" font-family="'JetBrains Mono', monospace" font-size="9" fill="#97C148">▸ 53% contact rate increase</text>
</svg>
