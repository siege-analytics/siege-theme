<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" fill="none">
  <!-- Grid mark -->
  <g transform="translate(0, 8)">
    <!-- Crosshair/reticle — geographic precision -->
    <rect x="0" y="14" width="32" height="2" rx="1" fill="#97C148"/>
    <rect x="14" y="0" width="2" height="32" rx="1" fill="#97C148"/>
    <circle cx="15" cy="15" r="8" stroke="#97C148" stroke-width="2" fill="none"/>
    <circle cx="15" cy="15" r="2.5" fill="#97C148"/>
  </g>
  <!-- Wordmark -->
  <text x="44" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.02em" fill="#97C148">SIEGE</text>
  <text x="158" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="300" letter-spacing="-0.02em" fill="#e0e0e0">ANALYTICS</text>
</svg>
